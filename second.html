<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
</head>
<body>
    <a href="first.html">Home</a>
    <form action="">
        <h1>Payment Form</h1>
        <h2>Contact Information</h2>
        <p>Name: <input type="text" name="name" required></p>
        <fieldset>
            <legend>Gender</legend>
        <p>Male: <input type="radio" name="gender" checked> Female: <input type="radio" name="gender" ></p>
        </fieldset>
        <p>Address: <textarea name="Address" cols="100" rows="8"></textarea></p>
        <p>Email:<input type="email" name="email"></p>
        <p>Pincode: <input type="number" name="Pincode"></p>
        <hr>
        <fieldset>
            <legend>Hello</legend>
        <p>
            Hello <input type="checkbox" name="Hello" checked> 
            Bye <input type="checkbox" name="Hello">
        </p>
        </fieldset>
        <h2>Payment Information</h2>
        <p>Card Type:
            <select name="card_type" id="card">
                <option value="">--Select a Card Type--</option>
                <option value="visa">Visa</option>
                <option value="mastercard">mastercard</option>
            </select>
        </p>
        <p>Card Number: <input type="number" name="card_number"></p>
        <p>Expiration Date: <input type="date" name="expirydate"></p>
        <p>CVV <input type="password" name="CVV"></p>
        <input type="submit" value="Pay Now">
    </form>
</body>
</html>
